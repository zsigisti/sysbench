<svg xmlns="http://www.w3.org/2000/svg" width="860" height="540" viewBox="0 0 860 540" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0a020"/>
      <stop offset="1" stop-color="#e0552b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- window -->
  <rect x="8" y="8" width="844" height="524" rx="14" fill="#0e1014" stroke="#2c313d" filter="url(#shadow)"/>

  <!-- header -->
  <rect x="28" y="28" width="42" height="42" rx="10" fill="url(#ember)"/>
  <text x="49" y="58" fill="#fff" font-size="24" font-weight="700" text-anchor="middle">C</text>
  <text x="82" y="48" fill="#e7e9ef" font-size="22" font-weight="700">CRUCIBLE</text>
  <text x="82" y="66" fill="#9aa1b1" font-size="12">Trial by fire — CPU · memory · network · storage</text>
  <!-- settings -->
  <text x="612" y="52" fill="#9aa1b1" font-size="12">Duration</text>
  <rect x="664" y="38" width="60" height="24" rx="6" fill="#222631" stroke="#2c313d"/>
  <text x="694" y="55" fill="#e7e9ef" font-size="12" text-anchor="middle">10s</text>
  <text x="732" y="52" fill="#9aa1b1" font-size="12">Runs</text>
  <rect x="766" y="38" width="44" height="24" rx="6" fill="#222631" stroke="#2c313d"/>
  <text x="788" y="55" fill="#e7e9ef" font-size="12" text-anchor="middle">5</text>
  <!-- theme switch -->
  <rect x="820" y="40" width="20" height="20" rx="10" fill="#222631"/>

  <!-- tabs -->
  <rect x="28" y="86" width="92" height="34" rx="8" fill="#191c23" stroke="#2c313d"/>
  <text x="74" y="108" fill="#e0552b" font-size="13" font-weight="700" text-anchor="middle">Benchmark</text>
  <text x="150" y="108" fill="#9aa1b1" font-size="13">System</text>
  <text x="222" y="108" fill="#9aa1b1" font-size="13">History</text>
  <text x="294" y="108" fill="#9aa1b1" font-size="13">Settings</text>

  <!-- suite buttons -->
  <rect x="28"  y="136" width="128" height="36" rx="8" fill="#e0552b"/>
  <text x="92"  y="159" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Full Benchmark</text>
  <rect x="164" y="136" width="64" height="36" rx="8" fill="#222631" stroke="#2c313d"/>
  <text x="196" y="159" fill="#e7e9ef" font-size="13" text-anchor="middle">CPU</text>
  <rect x="236" y="136" width="84" height="36" rx="8" fill="#222631" stroke="#2c313d"/>
  <text x="278" y="159" fill="#e7e9ef" font-size="13" text-anchor="middle">Memory</text>
  <rect x="328" y="136" width="88" height="36" rx="8" fill="#222631" stroke="#2c313d"/>
  <text x="372" y="159" fill="#e7e9ef" font-size="13" text-anchor="middle">Network</text>
  <rect x="424" y="136" width="84" height="36" rx="8" fill="#222631" stroke="#2c313d"/>
  <text x="466" y="159" fill="#e7e9ef" font-size="13" text-anchor="middle">Storage</text>
  <rect x="724" y="136" width="108" height="36" rx="8" fill="#222631" stroke="#2c313d"/>
  <text x="778" y="159" fill="#e7e9ef" font-size="13" text-anchor="middle">System Info</text>

  <!-- action row -->
  <rect x="28"  y="184" width="84" height="32" rx="8" fill="#e0552b"/>
  <text x="70"  y="205" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Submit ↑</text>
  <rect x="120" y="184" width="66" height="32" rx="8" fill="#222631" stroke="#2c313d"/>
  <text x="153" y="205" fill="#e7e9ef" font-size="12" text-anchor="middle">Share</text>
  <rect x="194" y="184" width="60" height="32" rx="8" fill="#222631" stroke="#2c313d"/>
  <text x="224" y="205" fill="#e7e9ef" font-size="12" text-anchor="middle">Copy</text>
  <rect x="262" y="184" width="84" height="32" rx="8" fill="#222631" stroke="#2c313d"/>
  <text x="304" y="205" fill="#e7e9ef" font-size="12" text-anchor="middle">Export .txt</text>
  <rect x="354" y="184" width="90" height="32" rx="8" fill="#222631" stroke="#2c313d"/>
  <text x="399" y="205" fill="#e7e9ef" font-size="12" text-anchor="middle">Export .json</text>
  <rect x="768" y="184" width="64" height="32" rx="8" fill="#222631" stroke="#2c313d"/>
  <text x="800" y="205" fill="#e7e9ef" font-size="12" text-anchor="middle">Clear</text>

  <!-- results card -->
  <rect x="28" y="232" width="804" height="280" rx="10" fill="#191c23" stroke="#2c313d"/>
  <text x="44" y="256" fill="#9aa1b1" font-size="11" font-weight="700" letter-spacing="1">RESULTS</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#e7e9ef">
    <text x="44" y="284">[1] CPU Benchmark  (10s/run, 5 runs, median ± stddev)</text>
    <text x="44" y="304" fill="#9aa1b1">  --- Single-threaded ---</text>
    <text x="44" y="322">  SHA-256     :   612.40 ±  3.10 MB/s</text>
    <text x="44" y="340">  MatMul      :    48.90 ±  0.40 GFLOPS</text>
    <text x="44" y="358">  Composite ST score: 1287</text>
    <text x="44" y="380" fill="#9aa1b1">  --- Multi-threaded (20 threads) ---</text>
    <text x="44" y="398">  Composite MT score: 11860</text>
    <text x="44" y="416" fill="#46c95a">  Speedup: 9.21×</text>
    <text x="44" y="440">[2] Memory Bandwidth (STREAM)   Triad : 44.80 GB/s</text>
    <text x="44" y="460">[3] Network — Cloudflare   ↓ 612 Mbps  ↑ 58 Mbps  9.8 ms</text>
    <text x="44" y="480">[4] Storage   Seq Write : 2980 MB/s   Seq Read : 3460 MB/s</text>
    <text x="44" y="500" fill="#e0552b">  Recorded run · Shared via crux ✓</text>
  </g>
</svg>
